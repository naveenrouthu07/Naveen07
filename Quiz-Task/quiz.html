<!DOCTYPE html>
<html>
<head>
    <title>Quiz App</title>
    <link rel="stylesheet" href="quiz.css">
</head>
<body>

<div class="container">

    <div id="welcome">
        <h1>JavaScript Quiz App</h1>
        <p>Test your JavaScript knowledge</p>
        <p>Total Questions: 10</p>
        <button id="startBtn">Start Quiz</button>
    </div>

    <div id="quiz" class="hide">
        <h2 id="question"></h2>

        <div id="options"></div>

        <p id="progress"></p>

        <div class="buttons">
            <button id="prevBtn">Previous</button>
            <button id="nextBtn">Next</button>
            <button id="submitBtn" class="hide">Submit Quiz</button>
        </div>
    </div>

    <div id="result" class="hide">
        <h1>Quiz Completed</h1>
        <p id="message"></p>

        <p>Total Questions: <span id="total"></span></p>
        <p>Correct Answers: <span id="correct"></span></p>
        <p>Wrong Answers: <span id="wrong"></span></p>
        <p>Percentage: <span id="percent"></span>%</p>

        <button id="restartBtn">Restart Quiz</button>
    </div>

</div>

<script src="quiz.js"></script>


</body>
</html>
