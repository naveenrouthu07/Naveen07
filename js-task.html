    <script>
        let monthNumber = Number(prompt("Enter a month number"));
        switch (monthNumber) {
            case 1:
                console.log("January");
                break;
            case 2:
                console.log("February");
                break;
            case 3:
                console.log("March");
                break;

                break;
            case 9:

            case 10:

        }


        let month = prompt("Enter a month name:");
        switch (month) {
            case "march":
            case "april":
            case "may":

                break;
            case "june":
            case "july":
